<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Product Grid</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body class="bg-green-50 min-h-screen p-8">

        <section class="max-w-7x1 mx-auto">

            <h1 class="text-3x1 font-bold mb-8 text-center">Gadgets</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

                <!-- Card 1 -->
                <div class="bg-white rounded-2x1 shadow-sm hover:shadow-lg hover:scale-105 transition-all duration-300 p-4 flex flex-col justify-between">

                    <img src="https://i.postimg.cc/zDj64fQV/wireless_headphone.jpg" class="rounded-x1 object-cover h-48 w-full mb-4">

                    <div class="space-y-2">
                    <h2 class="text-lg font-semibold">Wireless Headphones</h2>
                    <p class="text-gray-600 font-medium">$49.99</p>
                </div>

                <button class="mt-6 bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition">Add to Cart</button>

             </div>

             <!-- Card 2 -->
              <div class="bg-white rounded-2x1 shadwo-sm hover:shadow-lg hover:scale-105 transition-all duration-300 p-4 flex flex-col justify-between">
                
                <img src="https://i.postimg.cc/MZDNgGLn/smart_watch.jpg" alt="Smart Watch" class="rounded-x1 object-cover h-48 w-full mb-4">
                <div class="space-y-2">
                    <h2 class="text-lg font-semibold">Smart Watch</h2>
                    <p class="text-gray-600 font-medium">$99.99</p>
                </div>
                <button class="mt-6 bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition">Add to Cart</button>
              </div>
              
              <!-- Card 3 -->
               <div class="bg-white rounded-2x1 shadow-sm hover:shadow-lg hover:scale-105 transition-all duration-300 p-4 flex flex-col justify-between">

                <img src="https://i.postimg.cc/445qj30h/gaming_mouse.jpg" alt="Gaming Mouse" class="rounded-x1 object-cover h-48 w-full mb-4">
                <div class="space-y-2">
                    <h2 class="text-lg font-semibold">Gaming Mouse</h2>
                    <p class="text-gray-600 font-medium">$14.99</p>
                </div>
                <button class="mt-6 bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition">Add to Cart</button>
               </div>

               <!-- Card 4 -->
                <div class="bg-white rounded-2x1 shadow-sm hover: shadow-lg hover:scale-105 transition-all duration-300 p-4 flex flex-col justify-between">

                <img src="https://i.postimg.cc/MZDNgGLf/bluetooth_speaker.jpg" alt="Bluetooth Speaker" class="rounded-x1 object-cover h-48 w-full mb-4">
                <div class="space-y-2">
                    <h2 class="text-lg font-semibold">Bluetooth Speaker</h2>
                    <p class="text-gray-600 font-medium">$79.99</p>
                </div>
                <button class="mt-6 bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition">Add to Cart</button>
                </div>
          </div>
        </section>
    </body>
</html>
